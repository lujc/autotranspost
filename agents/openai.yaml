interface:
  display_name: "AutoPublish"
  short_description: "最高画质下载、模型双语字幕、自动烧录与可选 B 站发布"
  default_prompt: "Use $autopublish to download this video at maximum quality and save its cover. If subtitles exist, use next-batch to translate every pending subtitle batch in order with the current session model, then let the renderer resegment it. Never read the full manifest. Burn bottom-stacked MiSans bilingual captions, show compact milestone progress, and continue until the delivery gate passes. Only publish to Bilibili when the user explicitly asks (opt-in)."

